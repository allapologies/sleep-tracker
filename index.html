<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sleep">
  <meta name="theme-color" content="#6366f1">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Sleep Tracker</title>
</head>
<body>

<header class="header">
  <h1 class="header-title">Sleep Tracker</h1>
</header>

<main class="main">

  <!-- ── Log ──────────────────────────────────────── -->
  <section id="view-log" class="view active">
    <div class="card">
      <div class="form-row">
        <label class="form-label" for="input-date">Date</label>
        <input type="date" id="input-date" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label" for="input-bed">Went to bed</label>
        <input type="time" id="input-bed" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label" for="input-sleep">Fell asleep</label>
        <input type="time" id="input-sleep" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label" for="input-wake">Woke up</label>
        <input type="time" id="input-wake" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label" for="input-wakeups">Night wake-ups</label>
        <input type="number" id="input-wakeups" class="form-input" min="0" max="20" placeholder="0">
      </div>
      <div class="form-row">
        <label class="form-label" for="input-wakemins">Wake-up minutes</label>
        <input type="number" id="input-wakemins" class="form-input" min="0" max="300" placeholder="0">
      </div>
      <div class="form-row quality-row">
        <label class="form-label" for="input-quality">
          Quality&nbsp;<span id="quality-val" class="quality-badge">7</span>
        </label>
        <input type="range" id="input-quality" class="quality-slider" min="0" max="10" step="1" value="7">
      </div>
      <button id="btn-save" class="btn-primary">Save</button>
    </div>

    <!-- calculated preview -->
    <div id="results-card" class="card hidden">
      <div class="results-grid">
        <div class="result-item">
          <span class="result-label">Time in Bed</span>
          <span class="result-value" id="res-inbed">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">Total Sleep</span>
          <span class="result-value" id="res-sleep">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">Efficiency</span>
          <span class="result-value" id="res-se">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">Onset (SOL)</span>
          <span class="result-value" id="res-sol">—</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ── History ───────────────────────────────────── -->
  <section id="view-history" class="view">
    <div id="avg-card" class="card avg-card hidden">
      <div class="avg-title">7-day average</div>
      <div class="results-grid">
        <div class="result-item">
          <span class="result-label">In Bed</span>
          <span class="result-value" id="avg-inbed">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">Sleep</span>
          <span class="result-value" id="avg-sleep">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">SE %</span>
          <span class="result-value" id="avg-se">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">Quality</span>
          <span class="result-value" id="avg-quality">—</span>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Bed</th>
            <th>Wake</th>
            <th>Sleep</th>
            <th>SE%</th>
            <th>Q</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr class="empty-row"><td colspan="6">No entries yet</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- ── Charts ───────────────────────────────────── -->
  <section id="view-charts" class="view">
    <div class="range-toggle">
      <button class="toggle-btn active" data-range="7">7 days</button>
      <button class="toggle-btn" data-range="30">30 days</button>
      <button class="toggle-btn" data-range="0">All</button>
    </div>
    <div class="chart-card">
      <div class="chart-title">Sleep Duration (hours)</div>
      <canvas id="chart-sleep"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Sleep Efficiency (%)</div>
      <canvas id="chart-se"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Quality Score (0–10)</div>
      <canvas id="chart-quality"></canvas>
    </div>
  </section>

</main>

<!-- ── Bottom nav ───────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-view="log" aria-label="Log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    Log
  </button>
  <button class="nav-btn" data-view="history" aria-label="History">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    History
  </button>
  <button class="nav-btn" data-view="charts" aria-label="Charts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Charts
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
